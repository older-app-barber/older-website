<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/src/assets/logos/logo_black.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Older barber</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const favicon = document.getElementById('favicon');
      const darkMode = window.matchMedia('(prefers-color-scheme: dark)');

      const updateFavicon = (isDark) => {
        favicon.href = isDark
                ? '/src/assets/logos/logo_white.png'
                : '/src/assets/logos/logo_black.png';
      };

      updateFavicon(darkMode.matches);

      darkMode.addEventListener('change', (e) => updateFavicon(e.matches));
    </script>
  </body>
</html>
